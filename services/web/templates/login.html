<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sign in — MSAi Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--ink:#171b21;--ink-2:#5a6b7a;--rule:#c8d0d8;--paper:#e4e8ec;--brand:#12503f;
        --warn-bg:#fff4e0;--warn-edge:#8a6416;--err:#9c2f2f}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"IBM Plex Sans",system-ui,sans-serif;background:var(--paper);
       color:var(--ink);min-height:100vh;display:grid;place-items:center;padding:20px}
  .card{background:#fff;border:1px solid var(--rule);border-radius:4px;padding:32px;
        width:100%;max-width:400px}
  h1{font-size:19px;font-weight:600;margin-bottom:4px}
  .sub{font-size:13px;color:var(--ink-2);margin-bottom:22px}
  .tabs{display:flex;gap:4px;margin-bottom:20px;border-bottom:1px solid var(--rule)}
  .tab{flex:1;padding:9px;font-size:14px;font-weight:500;background:none;border:0;
       border-bottom:2px solid transparent;color:var(--ink-2);cursor:pointer}
  .tab.active{color:var(--brand);border-bottom-color:var(--brand)}
  label{display:block;font-size:12px;font-weight:500;color:var(--ink-2);
        text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px}
  input{width:100%;font-size:15px;padding:11px 13px;border:1px solid var(--rule);
        border-radius:3px;margin-bottom:16px}
  input:focus-visible{outline:2px solid var(--brand);outline-offset:1px}
  button.go{width:100%;font-size:15px;font-weight:500;padding:12px;background:var(--brand);
            color:#fff;border:0;border-radius:3px;cursor:pointer}
  button.go:hover{opacity:.94}
  .msg{font-size:13px;margin-bottom:14px;min-height:18px}
  .msg.err{color:var(--err)} .msg.ok{color:var(--brand)}
  .note{margin-top:20px;font-size:12px;color:var(--warn-edge);background:var(--warn-bg);
        border-left:3px solid var(--warn-edge);padding:9px 11px;line-height:1.5}
</style>
</head>
<body>
  <div class="card">
    <h1>MSAi Manager</h1>
    <p class="sub">Sign in with your work email.</p>

    <div class="tabs">
      <button class="tab active" id="tab-login" onclick="show('login')">Sign in</button>
      <button class="tab" id="tab-register" onclick="show('register')">Register</button>
    </div>

    <div class="msg" id="msg"></div>

    <label for="email">Work email</label>
    <input id="email" type="email" placeholder="you@company.com" autocomplete="email">
    <label for="password">Password</label>
    <input id="password" type="password" placeholder="••••••••" autocomplete="current-password">
    <button class="go" id="submit" onclick="submit()">Sign in</button>

    <div class="note">
      Your role is set automatically from your email domain — you can't choose it.
      This demo does not verify that you own the email address, so it must not be
      used with real customer data until email confirmation is added.
    </div>
  </div>

<script>
let mode = "login";
function show(m){
  mode = m;
  document.getElementById("tab-login").classList.toggle("active", m==="login");
  document.getElementById("tab-register").classList.toggle("active", m==="register");
  document.getElementById("submit").textContent = m==="login" ? "Sign in" : "Create account";
  document.getElementById("password").autocomplete = m==="login" ? "current-password":"new-password";
  msg("", "");
}
function msg(text, kind){
  const el = document.getElementById("msg");
  el.textContent = text; el.className = "msg " + (kind||"");
}
async function submit(){
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value;
  if(!email || !email.includes("@")){ msg("Enter a valid email.","err"); return; }
  if(!password){ msg("Enter your password.","err"); return; }
  const url = mode==="login" ? "/api/login" : "/api/register";
  try{
    const res = await fetch(url, {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({email, password})
    });
    const data = await res.json().catch(()=>({}));
    if(!res.ok){ msg(data.error || "Something went wrong.","err"); return; }
    window.location.href = "/";        // into the app; session cookie is set
  }catch(e){ msg("Network error.","err"); }
}
</script>
</body>
</html>
