substitutions:
  _REGION: europe-west1
  _SERVICE: msai-john
  _SERVICE_ACCOUNT: 1053168925742-compute@developer.gserviceaccount.com
  _IMAGE: europe-west1-docker.pkg.dev/$PROJECT_ID/cloud-run-source-deploy/msai-john:$BUILD_ID

steps:
  - id: Build John image
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - --file
      - services/john/Dockerfile
      - --tag
      - ${_IMAGE}
      - .

  - id: Push John image
    name: gcr.io/cloud-builders/docker
    args: [push, "${_IMAGE}"]

  - id: Deploy John
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_IMAGE}
      - --project=$PROJECT_ID
      - --region=${_REGION}
      - --service-account=${_SERVICE_ACCOUNT}
      - --set-env-vars=GOOGLE_CLOUD_PROJECT=$PROJECT_ID,GOOGLE_CLOUD_LOCATION=global,GOOGLE_GENAI_USE_VERTEXAI=TRUE,JOHN_MODEL=gemini-3.5-flash
      - --memory=1Gi
      - --concurrency=10
      - --max-instances=1
      - --timeout=300
      - --no-allow-unauthenticated
      - --quiet

options:
  dynamicSubstitutions: true
  logging: CLOUD_LOGGING_ONLY
