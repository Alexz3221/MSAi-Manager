name: Tests

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  unit-tests:
    name: Unit Tests (${{ matrix.suite }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: full-suite
            command: python -m unittest discover -s tests
          - suite: service-pull
            command: python -m unittest tests.test_service_pull
          - suite: queue-email
            command: python -m unittest tests.test_combine_and_send
          - suite: cloud-data
            command: python -m unittest tests.test_data_sources
          - suite: web-john
            command: python -m unittest tests.test_rate_limit tests.test_request_logging tests.test_john_runtime

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install -r requirements.txt

      - name: Run ${{ matrix.suite }} tests
        run: ${{ matrix.command }}
